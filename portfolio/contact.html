<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUYEON | Contact</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="contact">
  <main id="main" class="contact-page">
    <section class="contact-hero l-fullspan" aria-labelledby="contact-title">
      <div class="contact-hero__inner">
        <header class="contact-hero__header">
          <p class="contact-hero__eyebrow">CONTACT INFO</p>
          <h1 id="contact-title" class="contact-hero__title">연락 방법</h1>
          <p class="contact-hero__desc">편하게 연락주세요.</p>
        </header>

        <ul class="contact-list" aria-label="연락 방법 목록">
          <li class="contact-card">
            <a class="contact-card__link" href="mailto:suyeonn113@naver.com">
              <span class="contact-card__icon" aria-hidden="true">
                <i data-lucide="mail"></i>
              </span>
              <span class="contact-card__body">
                <strong class="contact-card__title">Email</strong>
                <span class="contact-card__text">suyeonn113@naver.com</span>
              </span>
              <span class="contact-card__bottom" aria-hidden="true">
                <span></span>
                <i data-lucide="arrow-right"></i>
              </span>
            </a>
          </li>

          <li class="contact-card">
            <a class="contact-card__link" href="https://github.com/suyeonn113" target="_blank" rel="noopener">
              <span class="contact-card__icon" aria-hidden="true">
                <img src="./assets/icons/tech/github.svg" alt="">
              </span>
              <span class="contact-card__body">
                <strong class="contact-card__title">GitHub</strong>
                <span class="contact-card__text">github.com/suyeonn113</span>
              </span>
              <span class="contact-card__bottom" aria-hidden="true">
                <span></span>
                <i data-lucide="arrow-right"></i>
              </span>
            </a>
          </li>

          <li class="contact-card">
            <a class="contact-card__link" href="./assets/files/resume.pdf" target="_blank" rel="noopener">
              <span class="contact-card__icon" aria-hidden="true">
                <i data-lucide="file-text"></i>
              </span>
              <span class="contact-card__body">
                <strong class="contact-card__title">Resume</strong>
                <span class="contact-card__text">PDF 보기</span>
              </span>
              <span class="contact-card__bottom" aria-hidden="true">
                <span></span>
                <i data-lucide="arrow-right"></i>
              </span>
            </a>
          </li>
        </ul>
      </div>
    </section>

    <section class="contact-thanks l-fullspan" aria-labelledby="contact-thanks-title">
      <div class="contact-thanks__inner">
        <p class="contact-thanks__eyebrow">THANK YOU</p>
        <h2 id="contact-thanks-title" class="contact-thanks__title">
          포트폴리오를 확인해주셔서 감사합니다.<br>
          궁금한 점이 있다면 언제든 연락 주세요.
        </h2>
        <span class="contact-thanks__mark" aria-hidden="true">✦</span>
      </div>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
