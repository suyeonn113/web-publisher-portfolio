<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수연의 작업실</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="work">
  <main id="main">
    <section class="work-page section-py l-fullspan" aria-labelledby="work-page-title">
      <div class="work-page__inner inner">
        <!-- Header -->
        <header class="work-page__header">
          <div class="work-page__heading">
            <h1 id="work-page-title" class="work-page__title">WORKS</h1>
            <p class="work-page__desc">
              각 프로젝트에 담긴 구조와 흐름을 확인해보세요.
            </p>
          </div>
        </header>

        <!-- Controls -->
        <section class="work-page__controls" aria-labelledby="work-page-controls-title">
          <h2 id="work-page-controls-title" class="visually-hidden">작업물 탐색 옵션</h2>

          <div class="work-page__filters" aria-label="작업물 필터">

            <!-- Device Filter -->
            <div class="work-page__filter-set">
              <p id="work-page-device-filter-title" class="work-page__filter-title">Device</p>
              <div class="work-page__filter-group"
                  role="toolbar"
                  aria-labelledby="work-page-device-filter-title">
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="device"
                        data-filter-value="mobile"
                        aria-pressed="false">
                  Mobile
                </button>
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="device"
                        data-filter-value="responsive"
                        aria-pressed="false">
                  Responsive
                </button>
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="device"
                        data-filter-value="pc"
                        aria-pressed="false">
                  PC
                </button>
              </div>
            </div>

            <!-- Type Filter -->
            <div class="work-page__filter-set">
              <p id="work-page-type-filter-title" class="work-page__filter-title">Type</p>
              <div class="work-page__filter-group"
                  role="toolbar"
                  aria-labelledby="work-page-type-filter-title">
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="type"
                        data-filter-value="e-commerce"
                        aria-pressed="false">
                  E-commerce
                </button>
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="type"
                        data-filter-value="public"
                        aria-pressed="false">
                  Public
                </button>
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="type"
                        data-filter-value="personal"
                        aria-pressed="false">
                  Personal
                </button>
                <button type="button"
                        class="work-page__filter-btn"
                        data-filter-group="type"
                        data-filter-value="brand"
                        aria-pressed="false">
                  Brand
                </button>
              </div>
            </div>
          </div>

          <!-- Sort -->
          <div class="work-page__sort">
            <label class="work-page__sort-label visually-hidden" for="work-sort">
              정렬 방식
            </label>
            <select id="work-sort" class="work-page__select" name="sort">
              <option value="latest">Latest</option>
              <option value="name">Name</option>
              <option value="featured">Featured</option>
            </select>
          </div>
        </section>

        <!-- Results -->
        <section class="work-page__body" aria-labelledby="work-page-list-title">
          <h2 id="work-page-list-title" class="visually-hidden">작업물 목록</h2>
          <p class="work-page__status visually-hidden" aria-live="polite" aria-atomic="true">
            총 <span class="work-page__count">0</span>개의 작업물이 있습니다.
          </p>
          <div class="work-page__list-wrap">
            
            <ul id="work-list" class="work-page__list" aria-label="작업물 목록">
              <li class="work-page__loading">
                <div class="home-work__loading work__loading">
                  <span class="loading-text">Loading...</span>
                </div>
              </li>
              <!-- Card Component-->
            </ul>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
