  <main id="main">
    <!-- Hero -->
    <section class="hero">
      <div class="hero__text-wrap">
        <h1 class="main-title">
          <span class="word word--hi">
            <span class="char">H</span>
            <span class="char">i</span>
            <span class="char">,</span>
          </span>
          <span class="word word--simple">
            <span class="char">S</span>
            <span class="char">i</span>
            <span class="char">m</span>
            <span class="char">p</span>
            <span class="char">l</span>
            <span class="char">y</span>
          </span>
          <span class="word word--me">
            <span class="char">m</span>
            <span class="char">e</span>
            <span class="dot">.</span>
          </span>
        </h1>
      </div>
      <div class="hero__scroll-hint scroll-down" aria-hidden="true">
        <span class="scroll-down__text">scroll down</span>
        <span class="scroll-down__icon">↓</span>
      </div>
    </section>

    <!-- Work -->
    <section class="work section" aria-labelledby="work-title">
      <div class="container">
        <header class="work__header">
          <h2 id="work-title" class="work__title">WORKS</h2>
          <a href="#" class="btn-more" aria-label="모든 프로젝트 보기">
            <span>View All</span>
          </a>
        </header>
        <div class="work__slider-container" role="region" aria-roledescription="carousel">
          <div class="work__cards-wrapper">
            <!-- Card Component Start-->
              <div class="work__loading">
                <span class="loading-text">Loading...</span>
              </div>
              <!-- Card Component End -->
           </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
