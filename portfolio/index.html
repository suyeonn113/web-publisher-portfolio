<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수연의 작업실</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="home">
  <main id="main">
    <!-- Hero -->
    <section class="hero l-fullspan">
      <div class="hero__text-wrap">
        <div class="hero__roof" aria-hidden="true">
          <svg viewBox="25 15 170 60" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <mask id="roofWindowMask">
                <rect width="220" height="90" fill="white"/>
                <rect x="95" y="44" width="12" height="11" fill="black" transform="rotate(-3 101 49.5)"/>
                <rect x="112" y="43" width="13" height="12" fill="black" transform="rotate(2 118.5 49)"/>
                <rect x="96" y="59" width="11" height="10" fill="black" transform="rotate(2 101.5 64)"/>
                <rect x="113" y="58" width="12" height="11" fill="black" transform="rotate(-3 119 63.5)"/>
              </mask>
            </defs>
            <g mask="url(#roofWindowMask)">
              <path d="M37 66 L107 19 L185 65 L181 67 L110 27 L43 68 Z" fill="currentColor"/>
              <path d="M149 23 L162 26 L160 47 L147 43 Z" fill="currentColor"/>
            </g>
          </svg>
        </div>
        <h1 class="main-title" aria-label="안녕하세요, 심플하게 저예요.">
          <span class="word word--suyeon">
            <span class="char" aria-hidden="true">S</span>
            <span class="char" aria-hidden="true">U</span>
            <span class="char" aria-hidden="true">Y</span>
            <span class="char" aria-hidden="true">E</span>
            <span class="char" aria-hidden="true">O</span>
            <span class="char" aria-hidden="true">N</span>
            <span class="char" aria-hidden="true">'</span>
            <span class="char" aria-hidden="true">S</span>
          </span>
          <span class="word word--workroom">
            <span class="char" aria-hidden="true">W</span>
            <span class="char" aria-hidden="true">O</span>
            <span class="char" aria-hidden="true">R</span>
            <span class="char" aria-hidden="true">K</span>
            <span class="char" aria-hidden="true">R</span>
            <span class="char" aria-hidden="true">O</span>
            <span class="char" aria-hidden="true">O</span>
            <span class="char" aria-hidden="true">M</span>
          </span>
        </h1>
      </div>
      <div class="hero__scroll-hint scroll-down" aria-label="그대로 내려보세요.">
        <span class="scroll-down__text">scroll down</span>
        <span class="scroll-down__icon">↓</span>
      </div>
    </section>

    <!-- Work -->
    <section class="home-work work section-py l-fullspan" aria-labelledby="work-title">
      <header class="home-work__header work__header">
        <h2 id="work-title" class="home-work__title work__title">WORKS</h2>
        <a href="./work.html" class="btn-more btn" aria-label="모든 작업물 보기">
          <span>View All</span>
        </a>
      </header>
      <div class="home-work__container work__container home-work__slider-container work__slider-container" role="region" aria-roledescription="carousel">
        <div id="work-list" class="home-work__cards-wrapper work__cards-wrapper">
          <!-- Card Component Start-->
          <div class="home-work__loading work__loading">
            <span class="loading-text">Loading...</span>
          </div>
          <!-- Card Component End -->
        </div>
        <div class="home-work__nav-controls work__nav-controls">
          <button class="home-work__nav-btn work__nav-btn is-prev btn"
                  type="button"
                  aria-label="이전 작업물 보기"
                  aria-controls="work-list">
                  Prev
          </button>
          <button class="home-work__nav-btn work__nav-btn is-next btn"
                  type="button"
                  aria-label="다음 작업물 보기"
                  aria-controls="work-list">
                  Next
          </button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
