<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수연의 작업실</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="home">
  <main id="main">
    <!-- Hero -->
    <section class="hero l-fullspan">
      <div class="hero__text-wrap">
        <h1 class="main-title" aria-label="안녕하세요, 심플하게 저예요.">
          <span class="word word--hi">
            <span class="char" aria-hidden="true">H</span>
            <span class="char" aria-hidden="true">i</span>
            <span class="char" aria-hidden="true">,</span>
          </span>
          <span class="word word--simple">
            <span class="char" aria-hidden="true">S</span>
            <span class="char" aria-hidden="true">i</span>
            <span class="char" aria-hidden="true">m</span>
            <span class="char" aria-hidden="true">p</span>
            <span class="char" aria-hidden="true">l</span>
            <span class="char" aria-hidden="true">y</span>
          </span>
          <span class="word word--me">
            <span class="char" aria-hidden="true">m</span>
            <span class="char" aria-hidden="true">e</span>
            <span class="dot" aria-hidden="true">.</span>
          </span>
        </h1>
      </div>
      <div class="hero__scroll-hint scroll-down" aria-label="그대로 내려보세요.">
        <span class="scroll-down__text">scroll down</span>
        <span class="scroll-down__icon">↓</span>
      </div>
    </section>

    <!-- Work -->
    <section class="work section-py l-fullspan" aria-labelledby="work-title">
      <header class="work__header">
        <h2 id="work-title" class="work__title">WORKS</h2>
        <a href="#" class="btn-more" aria-label="모든 작업물 보기">
          <span>View All</span>
        </a>
      </header>
      <div class="work__container work__slider-container" role="region" aria-roledescription="carousel">
        <div id="work-list" class="work__cards-wrapper">
          <!-- Card Component Start-->
          <div class="work__loading">
            <span class="loading-text">Loading...</span>
          </div>
          <!-- Card Component End -->
        </div>
        <div class="work__nav-controls">
          <button class="work__nav-btn is-prev btn"
                  type="button"
                  aria-label="이전 작업물 보기"
                  aria-controls="work-list">
                  Prev
          </button>
          <button class="work__nav-btn is-next btn"
                  type="button"
                  aria-label="다음 작업물 보기"
                  aria-controls="work-list">
                  Next
          </button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
