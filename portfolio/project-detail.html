<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수연의 작업실</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="project-detail">
  <main id="main">
    <div class="project-detail" data-page-root>

      <!-- ========================================
          HERO
      ========================================= -->
      <section class="project-hero" data-section="hero" data-gsap-target="section">
        <div class="project-hero__inner">
          <div class="project-hero__body" data-gsap-target="hero-copy">
            <p class="project-hero__label" data-field="meta.label"></p>
            <h1 class="project-hero__title" data-field="meta.title"></h1>
            <div class="project-hero__description" data-field="hero.description"></div>
            <ul class="project-hero__tags" data-field="hero.tags"></ul>
            <dl class="project-meta">
              <div>
                <dt>기간</dt>
                <dd data-field="meta.dateRange"></dd>
              </div>
              <div>
                <dt>역할</dt>
                <dd data-field="meta.role"></dd>
              </div>
              <div>
                <dt>형태</dt>
                <dd data-field="meta.projectType"></dd>
              </div>
              <div>
                <dt>규모</dt>
                <dd data-field="meta.projectScale"></dd>
              </div>
            </dl>
            <div class="project-hero__actions">
              <a href="#" class="btn btn--wide btn--surface" data-field="meta.liveLink" data-link-type="live">
                사이트 바로가기
              </a>
            </div>
          </div>
          <div class="project-hero__visual" data-gsap-target="hero-visual">
            <div data-field="hero.visuals"></div>
          </div>
        </div>
      </section>

      <!-- ========================================
          SUMMARY
      ========================================= -->
      <section class="project-summary" data-section="summary" data-gsap-target="section">
        <div class="project-summary__container">
          <div class="project-summary__header">
            <h2 class="section-title">SUMMARY</h2>
          </div>
          <div class="project-summary__content">
            <div class="project-summary__block" data-summary-index="0">
              <h3 class="project-summary__label">프로젝트 요약</h3>
              <p class="project-summary__text" data-field="summary.overview"></p>
            </div>
            <div class="project-summary__block" data-summary-index="1">
              <h3 class="project-summary__label">주요 역할</h3>
              <p class="project-summary__text" data-field="summary.role"></p>
            </div>
            <div class="project-summary__block" data-summary-index="2">
              <h3 class="project-summary__label">기술</h3>
              <p class="project-summary__text" data-field="summary.tech"></p>
            </div>
          </div>
        </div>
      </section>

      <!-- ========================================
          CASES
      ========================================= -->
      <section class="project-cases" data-section="cases" data-gsap-target="section">
        <h2 class="section-title">KEY FLOWS</h2>
        <div class="project-cases__layout">
          <aside class="project-cases__nav" aria-label="Case navigation">
            <div class="project-cases__nav-inner">
              <p class="project-cases__eyebrow">Flow Index</p>
              <div class="case-list" data-field="caseList"></div>
            </div>
          </aside>
          <div class="project-cases__content" data-field="casePanels"></div>
        </div>
        <div class="project-cases-mobile-nav" data-case-island aria-hidden="true">
          <div class="project-cases-mobile-nav__inner">
            <div class="project-cases-mobile-nav__track" data-field="caseListMobile"></div>
          </div>
        </div>
      </section>

      <!-- ========================================
          HIGHLIGHTS
      ========================================= -->
      <section class="project-highlights" data-section="highlights" data-gsap-target="section">
        <h2 class="section-title">HIGHLIGHTS</h2>
        <div class="highlight-list" data-field="highlights"></div>
      </section>

      <!-- ========================================
          ETC
      ========================================= -->
      <section class="project-etc" data-section="etc" data-gsap-target="section">
        <h2 class="section-title">ETC</h2>
          <div class="project-etc__grid">
            <div>
            <h3>배포</h3>
            <p data-field="etc.deployment"></p>
          </div>
            <div>
            <h3>도구</h3>
            <p data-field="etc.tools"></p>
          </div>
            <div>
            <h3>기여</h3>
            <p data-field="etc.contribution"></p>
            </div>
          </div>
      </section>

      <!-- ========================================
          TEMPLATE
      ========================================= -->
      <template id="tpl-hero-tag">
        <li class="project-hero__tag"></li>
      </template>

      <template id="tpl-hero-desc">
        <p class="project-hero__desc-line"></p>
      </template>

      <template id="tpl-case-item">
        <button class="case-item" type="button" aria-pressed="false">
          <span class="case-item__title"></span>
        </button>
      </template>

      <template id="tpl-case-panel">
        <article class="case-panel">
          <div class="case-panel__heading">
            <p class="case-panel__index"></p>
            <h3 class="case-panel__title"></h3>
          </div>
          <div class="case-panel__layout">
            <div class="case-panel__content">
              <section>
                <h4>문제</h4>
                <p class="case-panel__problem"></p>
              </section>
              <section>
                <h4>해결</h4>
                <p class="case-panel__solution"></p>
              </section>
              <section>
                <h4>구현</h4>
                <ul class="case-panel__implementation"></ul>
              </section>
              <section>
                <h4>포인트</h4>
                <p class="case-panel__key-point"></p>
              </section>
            </div>
            <ol class="case-steps"></ol>
          </div>
        </article>
      </template>

      <template id="tpl-case-step">
        <li class="case-step">
          <button class="case-step__button" type="button" aria-haspopup="dialog">
            <figure class="case-step__figure">
              <span class="case-step__visual">
                <img src="" alt="" loading="lazy">
              </span>
              <figcaption></figcaption>
            </figure>
          </button>
        </li>
      </template>

      <template id="tpl-case-gallery-modal">
        <div class="case-gallery-modal" hidden>
          <div class="case-gallery-modal__backdrop" data-gallery-close></div>
          <div
            class="case-gallery-modal__dialog"
            role="dialog"
            aria-modal="true"
            aria-label="Key flow image viewer"
            tabindex="-1"
          >
            <div class="case-gallery-modal__chrome">
              <p class="case-gallery-modal__eyebrow">Key Flow Preview</p>
              <div class="case-gallery-modal__actions">
                <button class="case-gallery-modal__nav" type="button" data-gallery-prev aria-label="이전 이미지">Prev</button>
                <button class="case-gallery-modal__nav" type="button" data-gallery-next aria-label="다음 이미지">Next</button>
                <button class="case-gallery-modal__close" type="button" data-gallery-close aria-label="이미지 닫기">Close</button>
              </div>
            </div>
            <figure class="case-gallery-modal__figure">
              <div class="case-gallery-modal__media" data-gallery-media>
                <img class="case-gallery-modal__image" data-gallery-image src="" alt="">
              </div>
              <figcaption class="case-gallery-modal__caption" data-gallery-caption></figcaption>
            </figure>
          </div>
        </div>
      </template>

      <template id="tpl-highlight">
        <article>
          <h3></h3>
          <p></p>
        </article>
      </template>

      <template id="tpl-hero-visual">
        <figure>
          <img src="" alt="">
        </figure>
      </template>
    </div>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
